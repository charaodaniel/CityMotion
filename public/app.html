<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityMotion — Painel</title>
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#93c5fd', 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            sidebar: '#0f0f13',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased">
  <div id="appRoot" class="flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="app-sidebar fixed md:sticky top-0 left-0 z-40 h-screen w-64 bg-[#0a0a0e] border-r border-zinc-800/50 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0">
      <!-- Logo -->
      <div class="p-4 border-b border-zinc-800/50 flex items-center gap-3">
        <div class="bg-zinc-100 text-zinc-900 p-1.5 rounded-lg flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="font-bold text-sm tracking-tight">CityMotion</span>
      </div>

      <!-- Menu de navegação -->
      <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="sidebarNav">
        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-600 px-3 pt-4 pb-2">Plataforma</div>
        <a href="#/dashboard" data-route="/dashboard" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Dashboard
        </a>
        <a href="#/viagens" data-route="/viagens" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
          Missões
        </a>
        <a href="#/veiculos" data-route="/veiculos" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          Frota
        </a>

        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-600 px-3 pt-4 pb-2">Logística</div>
        <a href="#/funcionarios" data-route="/funcionarios" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
          Funcionários
        </a>
        <a href="#/setores" data-route="/setores" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          Setores
        </a>

        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-600 px-3 pt-4 pb-2">Operações</div>
        <a href="#/abastecimento" data-route="/abastecimento" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          Abastecimento
        </a>
        <a href="#/manutencao" data-route="/manutencao" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Manutenção
        </a>
        <a href="#/escalas" data-route="/escalas" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Escalas
        </a>
        <a href="#/chat" data-route="/chat" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          Chat
        </a>

        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-600 px-3 pt-4 pb-2">Gestão</div>
        <a href="#/relatorios" data-route="/relatorios" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Relatórios
        </a>
        <a href="#/perfil" data-route="/perfil" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Perfil
        </a>
        <a href="#/settings" data-route="/settings" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Configurações
        </a>
      </nav>

      <!-- User info + logout -->
      <div class="p-3 border-t border-zinc-800/50" id="sidebarUser">
        <div class="flex items-center gap-3 px-3 py-2">
          <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-xs font-bold text-zinc-400" id="userAvatar">U</div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-medium text-zinc-300 truncate" id="userName">Usuário</p>
            <p class="text-[10px] text-zinc-600 truncate" id="userRole">Carregando...</p>
          </div>
          <button onclick="API.logout()" class="text-zinc-600 hover:text-red-400 transition-colors" title="Sair">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebarOverlay" class="sidebar-overlay fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Main content -->
    <div class="flex-1 flex flex-col min-h-screen">
      <!-- Header -->
      <header class="sticky top-0 z-20 bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-800/30">
        <div class="flex items-center justify-between px-4 sm:px-6 h-14">
          <div class="flex items-center gap-3">
            <!-- Sidebar toggle (mobile) -->
            <button onclick="toggleSidebar()" class="md:hidden text-zinc-400 hover:text-zinc-200">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
              </svg>
            </button>
            <div>
              <h1 id="pageTitle" class="text-sm font-bold tracking-tight">CityMotion</h1>
              <p id="pageDescription" class="text-[10px] text-zinc-500"></p>
            </div>
          </div>
          <div class="flex items-center gap-1 no-print">
            <!-- Notificações -->
            <div class="relative" id="notificationArea">
              <button onclick="toggleNotifications()" class="btn btn-ghost btn-sm relative" title="Notificações" id="notifBell">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
                <span id="notifBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold rounded-full min-w-[16px] h-4 flex items-center justify-center px-1 hidden">0</span>
              </button>
              <!-- Dropdown notificações -->
              <div id="notifDropdown" class="absolute right-0 top-full mt-2 w-80 bg-[#0f0f13] border border-zinc-700/50 rounded-xl shadow-2xl shadow-black/50 overflow-hidden hidden z-50">
                <div class="p-3 border-b border-zinc-800/30 flex items-center justify-between">
                  <span class="text-xs font-bold uppercase tracking-widest text-zinc-400">Notificações</span>
                  <button onclick="WS.markAllRead();document.getElementById('notifDropdown').classList.add('hidden')" class="text-[9px] text-primary hover:underline font-bold uppercase tracking-widest">Limpar</button>
                </div>
                <div id="notifList" class="max-h-80 overflow-y-auto">
                  <div class="p-6 text-center text-[11px] text-zinc-600 italic">Nenhuma notificação.</div>
                </div>
              </div>
            </div>
            <button onclick="Store.loadAll()" class="btn btn-ghost btn-sm" title="Atualizar">
              <svg class="w-3.5 h-3.5 refresh-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
            </button>
            <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-xs font-bold text-zinc-400 cursor-pointer" id="headerAvatar" onclick="window.location.hash='/perfil'">U</div>
          </div>
        </div>
      </header>

      <!-- Page content -->
      <main id="pageContent" class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="flex items-center justify-center py-20">
          <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-xs text-zinc-500 uppercase tracking-widest">Carregando...</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ws.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Registrar Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <script>
    // Toggle sidebar (mobile)
    function toggleSidebar() {
      document.getElementById('appRoot').classList.toggle('sidebar-open');
    }

    // Atualizar informações do usuário na sidebar
    Store.on('user', (user) => {
      if (!user) return;
      const initial = (user.name || 'U').charAt(0).toUpperCase();
      document.getElementById('userName').textContent = user.name || 'Usuário';
      document.getElementById('userRole').textContent = user.role || 'Colaborador';
      document.getElementById('userAvatar').textContent = initial;
      document.getElementById('headerAvatar').textContent = initial;
    });

    // Animação do ícone de refresh
    document.querySelector('.refresh-icon')?.addEventListener('click', function() {
      this.classList.add('animate-spin');
      setTimeout(() => this.classList.remove('animate-spin'), 1000);
    });

    // Notificações
    function toggleNotifications() {
      const dd = document.getElementById('notifDropdown');
      dd.classList.toggle('hidden');
      if (!dd.classList.contains('hidden')) renderNotifications();
    }

    function renderNotifications() {
      const list = document.getElementById('notifList');
      const notifs = Store.get('notifications') || [];
      if (!list) return;

      if (notifs.length === 0) {
        list.innerHTML = '<div class="p-6 text-center text-[11px] text-zinc-600 italic">Nenhuma notificação.</div>';
        return;
      }

      list.innerHTML = notifs.map((n, i) => `
        <div class="p-3 border-b border-zinc-800/20 hover:bg-zinc-900/40 transition-colors cursor-pointer ${n.read ? 'opacity-50' : ''}"
          onclick="${n.link ? `window.location.hash='${n.link}';` : ''}WS.markAllRead();document.getElementById('notifDropdown').classList.add('hidden')">
          <div class="flex items-start gap-3">
            <div class="w-7 h-7 rounded-full flex items-center justify-center shrink-0
              ${n.type === 'request' ? 'bg-amber-500/10 text-amber-400' : ''}
              ${n.type === 'vehicle' ? 'bg-blue-500/10 text-blue-400' : ''}
              ${n.type === 'message' ? 'bg-emerald-500/10 text-emerald-400' : ''}
              ${!n.type || n.type === 'info' ? 'bg-primary/10 text-primary' : ''}">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${n.type === 'request' ? 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' : n.type === 'vehicle' ? 'M13 10V3L4 14h7v7l9-11h-7z' : n.type === 'message' ? 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' : 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'}"></svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-[11px] font-bold truncate">${n.title || 'Notificação'}</p>
              <p class="text-[10px] text-zinc-500 mt-0.5 line-clamp-2">${n.message || ''}</p>
              <p class="text-[8px] font-mono text-zinc-700 mt-1">${new Date(n.timestamp || Date.now()).toLocaleString('pt-BR')}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Atualizar badge de notificações
    Store.on('notifications', (notifs) => {
      const badge = document.getElementById('notifBadge');
      if (!badge) return;
      const unread = (notifs || []).filter(n => !n.read).length;
      if (unread > 0) {
        badge.classList.remove('hidden');
        badge.textContent = unread > 99 ? '99+' : unread;
      } else {
        badge.classList.add('hidden');
      }
    });

    // Fechar dropdown ao clicar fora
    document.addEventListener('click', (e) => {
      const area = document.getElementById('notificationArea');
      const dd = document.getElementById('notifDropdown');
      if (area && dd && !area.contains(e.target)) {
        dd.classList.add('hidden');
      }
    });

    // WebSocket status indicator
    Store.on('wsStatus', (connected) => {
      const bell = document.getElementById('notifBell');
      if (bell) {
        bell.title = connected ? 'Notificações em tempo real' : 'Notificações offline';}
    });
  </script>
</body>
</html>
