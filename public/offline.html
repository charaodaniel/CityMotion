<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityMotion — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(15,15,19,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(147,197,253,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    .icon svg { width: 40px; height: 40px; color: #93c5fd; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 14px; color: #a1a1aa; line-height: 1.6; margin-bottom: 8px; }
    .status { margin-top: 24px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; font-size: 12px; color: #71717a; }
    .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 8px; vertical-align: middle; }
    .retry-btn {
      margin-top: 24px;
      padding: 12px 24px;
      background: #93c5fd;
      color: #09090b;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .retry-btn:hover { opacity: 0.9; }
    .features { margin-top: 28px; display: flex; flex-direction: column; gap: 8px; }
    .feature { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #71717a; }
    .feature svg { width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
      </svg>
    </div>
    <h1>Sem Conexão</h1>
    <p>Você está offline no momento. Algumas funcionalidades podem não estar disponíveis.</p>
    <p style="font-size:12px;color:#52525b">Os dados em cache ainda estão acessíveis.</p>
    <div class="status">
      <span class="dot"></span>
      <span id="statusText">Verificando conexão...</span>
    </div>
    <button class="retry-btn" onclick="retryConnection()">Tentar Novamente</button>
    <div class="features">
      <div class="feature">
        <svg fill="none" stroke="#22c55e" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Dashboard com dados em cache
      </div>
      <div class="feature">
        <svg fill="none" stroke="#22c55e" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Consultas a dados previamente carregados
      </div>
    </div>
  </div>
  <script>
    function retryConnection() {
      const btn = document.querySelector('.retry-btn');
      const status = document.getElementById('statusText');
      const dot = document.querySelector('.status .dot');
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      status.textContent = 'Tentando reconectar...';
      dot.style.background = '#facc15';

      setTimeout(() => {
        if (navigator.onLine) {
          window.location.href = '/app.html#/dashboard';
        } else {
          btn.disabled = false;
          btn.textContent = 'Tentar Novamente';
          status.textContent = 'Ainda offline';
          dot.style.background = '#ef4444';
        }
      }, 2000);
    }

    // Escutar quando voltar a ficar online
    window.addEventListener('online', () => {
      window.location.href = '/app.html#/dashboard';
    });

    // Atualizar status inicial
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('statusText').textContent = navigator.onLine ? 'Conectando...' : 'Offline';
      if (navigator.onLine) {
        window.location.href = '/app.html#/dashboard';
      }
    });
  </script>
</body>
</html>
