version: '3.8'

services:
  # --- Banco de Dados PostgreSQL (opcional, para produção) ---
  postgres:
    image: postgres:16-alpine
    container_name: citymotion-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: citymotion
      POSTGRES_USER: citymotion_user
      POSTGRES_PASSWORD: citymotion_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citymotion_user -d citymotion"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres
      - production

  # --- Aplicação CityMotion (Backend Fastify + SPA Frontend) ---
  citymotion:
    build: .
    container_name: citymotion-app
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    volumes:
      # Persistência do banco SQLite (usado por padrão)
      - sqlite_data:/app/database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Para usar PostgreSQL, descomente e ative o profile:
      # - DATABASE_URL=postgresql://citymotion_user:citymotion_pass@postgres:5432/citymotion

volumes:
  postgres_data:
  sqlite_data:
