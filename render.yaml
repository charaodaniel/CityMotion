# =============================================================
# CityMotion - Render Blueprint (Infrastructure as Code)
# =============================================================
# Render: https://render.com/docs/blueprint-spec
#
# Para fazer o deploy:
#   1. Faça push deste arquivo para o GitHub
#   2. No Render Dashboard, clique em "New +" > "Blueprint"
#   3. Conecte seu repositório e selecione este arquivo
#   4. Render criará automaticamente o BD PostgreSQL e o Web Service
# =============================================================

databases:
  - name: citymotion-db
    databaseName: citymotion
    user: citymotion_user
    plan: free
    region: ohio
    ipAllowList: [] # Apenas serviços internos do Render

services:
  # --- Web Service: CityMotion (Frontend + Backend) ---
  - type: web
    name: citymotion
    runtime: node
    region: ohio
    plan: free
    branch: main
    buildCommand: npm install --production=false && cd backend && npm install && cd .. && npm run build
    startCommand: node backend/server.js
    healthCheckPath: /api/health

    # Fazer o build usar o Dockerfile se preferir:
    # dockerfilePath: ./Dockerfile

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: citymotion-db
          property: connectionString
      - key: CORS_ORIGIN
        # Substitua pelo seu domínio Render após o deploy:
        # https://seuprojeto.onrender.com
        value: http://localhost:9002
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "false"
