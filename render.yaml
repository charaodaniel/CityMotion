# =============================================================
# CityMotion - Render Blueprint (Infrastructure as Code)
# =============================================================
# Render: https://render.com/docs/blueprint-spec
#
# Arquitetura:
#   Frontend: SPA HTML/JS/CSS servido pelo Fastify em /public
#   Backend:  Fastify + Drizzle ORM + Socket.IO
#   Banco:    PostgreSQL gerenciado pelo Render
#
# Para fazer o deploy:
#   1. Faça push deste arquivo para o GitHub
#   2. No Render Dashboard, clique em "New +" > "Blueprint"
#   3. Conecte seu repositório e selecione este arquivo
#   4. Render criará automaticamente o BD PostgreSQL e o Web Service
# =============================================================

databases:
  - name: citymotion-db
    databaseName: citymotion
    user: citymotion_user
    plan: free
    region: ohio
    ipAllowList: [] # Apenas serviços internos do Render

services:
  # --- Web Service: CityMotion (Backend Fastify + SPA Frontend) ---
  - type: web
    name: citymotion
    runtime: node
    region: ohio
    plan: free
    branch: main
    buildCommand: cd backend && npm install --include=dev && cd ..
    startCommand: cd backend && npx drizzle-kit push && node src/index.js
    healthCheckPath: /api/health

    # Para usar Docker em vez de build nativo, descomente:
    # dockerfilePath: ./Dockerfile

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: citymotion-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://citymotion.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      # ── Supabase Auth ────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
